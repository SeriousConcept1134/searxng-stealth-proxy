services:
  sxng-proxy:
    build: ./proxy
    container_name: sxng-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - PROXY_URL=${PROXY_URL:-}
      - BRAVE_PROFILE_0=/data/brave_profile_0
      - BRAVE_PROFILE_1=/data/brave_profile_1
      - BRAVE_PROFILE_2=/data/brave_profile_2
      - STARTUP_IDLE_SECONDS=${STARTUP_IDLE_SECONDS:-0}
      - SEARCH_MODE=${SEARCH_MODE:-direct}
      - BROWSER_MODE=${BROWSER_MODE:-on_demand}
    volumes:
      - ./data/brave_profile_0:/data/brave_profile_0:z
      - ./data/brave_profile_1:/data/brave_profile_1:z
      - ./data/brave_profile_2:/data/brave_profile_2:z
      - ./proxy/app:/app/app:z
    profiles:
      - standard
      - warp
    networks:
      - searxng-net

  searxng-warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    container_name: searxng-warp
    restart: unless-stopped
    ports:
      - "127.0.0.1:1080:9091"
    healthcheck:
      test: ["CMD", "curl", "-x", "socks5h://localhost:9091", "https://cloudflare.com/cdn-cgi/trace"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - warp
    networks:
      - searxng-net

networks:
  searxng-net:
    external: true
    name: ${EXTERNAL_NETWORK:-searxng-net}
